<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>D Box: How It Works</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at top, #1a1a1a, #000);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 420px;
    }

    h1 {
      font-size: 52px;
      margin: 0;
      letter-spacing: -2px;
    }

    .subtitle {
      margin-top: 10px;
      color: #aaa;
      font-size: 15px;
      line-height: 1.4;
      margin-bottom: 20px;
    }

    .player {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      backdrop-filter: blur(16px);
    }

    video {
      width: 100%;
      border-radius: 18px;
      display: block;
      background: black;
    }

    .steps {
      margin-top: 20px;
      display: grid;
      gap: 10px;
    }

    .step {
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
      font-size: 14px;
      color: #ddd;
    }

    .step span {
      color: white;
      font-weight: bold;
    }

    @media (min-width: 768px) {
      .app {
        max-width: 650px;
      }

      h1 {
        font-size: 70px;
      }

      .subtitle {
        font-size: 17px;
      }
    }
  </style>
</head>

<body>

  <main class="app">

    <h1>Using "D Box"</h1>
    <p class="subtitle">
     Think. Draw. Combine.
    </p>

    <div class="player">
      <video controls playsinline>
     <source src="dboxf.mp4" type="video/mp4">
        Your browser does not support this video format.
      </video>
    </div>

    <div class="steps">
      <div class="step"><span>01.</span> Pick a prompt</div>
      <div class="step"><span>02.</span> Draw on your acrylic sheet</div>
      <div class="step"><span>03.</span> Place it back inside the box</div>
    </div>

  </main>

</body>
</html>
